---
layout: default
---

<div class="container">
  <article class="article">
    <a href="{{ '/' | relative_url }}" class="article__back">&larr; Home</a>
    <h1 class="article__title">{{ page.title_en | default: page.title }}</h1>
    <div class="article__meta">
      <span>{{ page.date | date: "%Y.%m.%d" }}</span>
      {% if page.status_en or page.status %}
      <span class="article__status">{{ page.status_en | default: page.status }}</span>
      {% endif %}
    </div>

    <div class="prose">
      {{ content }}
    </div>
  </article>
</div>
