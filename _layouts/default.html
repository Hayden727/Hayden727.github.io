<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description | strip_html | truncatewords: 30 }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</head>
<body>
  <nav class="site-nav">
    <a href="{{ '/' | relative_url }}" class="site-nav__brand">{{ site.title }}</a>
    <div class="site-nav__links">
      <a href="{{ '/blog' | relative_url }}" {% if page.url contains '/blog' or page.layout == 'post' %}class="active"{% endif %}>Blog</a>
      <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">GitHub</a>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
        <span id="theme-icon">&#9790;</span>
      </button>
    </div>
  </nav>

  {{ content }}

  <footer class="site-footer">
    <div class="container">
      &copy; {{ 'now' | date: '%Y' }} {{ site.title }}
    </div>
  </footer>
</body>
</html>
