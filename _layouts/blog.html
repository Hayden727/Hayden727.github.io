---
layout: default
---

<div class="container">
  <div class="page-header">
    <h1 class="page-header__title">Writing</h1>
  </div>

  <section class="section">
    {% for post in site.posts %}
    <div class="post-item">
      <span class="post-item__date">{{ post.date | date: "%Y.%m.%d" }}</span>
      {% if post.categories.first %}
      <span class="post-item__category">{{ post.categories.first }}</span>
      {% endif %}
      <a href="{{ post.url | relative_url }}" class="post-item__title">{{ post.title }}</a>
    </div>
    {% endfor %}
  </section>
</div>
